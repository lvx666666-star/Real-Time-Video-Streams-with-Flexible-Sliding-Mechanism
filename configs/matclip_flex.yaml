experiment_name: matclip_flex
dataset:
  name: thumos14
  root: data/thumos14
  annotation_file: data/thumos14/annotations/thumos14_clip_annotations.json
  num_classes: 22
  clip_len: 16
  input_size: 112
sampler:
  temporal_uniform: true
  temporal_sampling_span: 32
  random_crop_mode: five_point
  horizontal_flip_prob: 0.5
  mean_subtraction: true
model:
  name: matclip
  num_classes: 22
  num_target_classes: 20
  input_channels: 3
  clip_len: 16
  input_size: 112
  embed_dim: 256
  depth: 4
  num_heads: 4
  mlp_ratio: 2.0
  tubelet_size_t: 2
  tubelet_size_h: 16
  tubelet_size_w: 16
  dropout: 0.1
  attention_mode: knn
  knn_attention_ratio: 0.75
  use_cls_token: false
scheduler:
  mode: flexible
  background_threshold: 0.95
  vague_threshold: 12.0
  gmm_std_factor: 2.5
  gmm_components: 3
  gmm_learning_rate: 0.05
  gmm_background_ratio: 0.7
  min_step: 1
runtime:
  device: cuda
  batch_size: 8
  num_workers: 4
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  output_dir: runs/matclip_flex
